name: Verify

on:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 13 * * 1"

permissions:
  contents: read

concurrency:
  group: verify-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  catalog-validation:
    name: catalog-validation
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out catalog
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Tests run before the source checkout exists so nothing outside test/
      # can ever be discovered by the test runner.
      - name: Run hermetic tests
        run: npm test

      - name: Check out source repository
        uses: actions/checkout@v7
        with:
          repository: CypherPoet/custom-agent-skills
          ref: main
          path: custom-agent-skills
          filter: blob:none
          sparse-checkout: |
            /scripts/
            /plugins/*/.claude-plugin/
            /plugins/*/.codex-plugin/
          sparse-checkout-cone-mode: false

      - name: Check catalogs against source
        run: npm run check -- --source-repo custom-agent-skills

      - name: Validate Claude marketplace schema
        run: npx claude plugin validate .
